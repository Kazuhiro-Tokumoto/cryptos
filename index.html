<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ECDSA Tool</title>
  <link rel="icon" href="https://illustimage.com/photo/12720.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; touch-action: manipulation; }
    :root {
      --bg: #f7f6f3; --surface: #ffffff; --border: #e2e0db;
      --text: #1a1917; --muted: #8a8780; --accent: #1a1917;
      --success: #2d6a4f; --error: #c1121f;
      --mono: 'JetBrains Mono', monospace; --sans: 'DM Sans', sans-serif;
    }
    body { margin:0; padding:0; background:var(--bg); color:var(--text); font-family:var(--sans); font-size:14px; line-height:1.6; min-height:100vh; }
    header { padding:32px 40px 24px; border-bottom:1px solid var(--border); background:var(--surface); }
    header h1 { margin:0; font-family:var(--mono); font-size:18px; font-weight:400; letter-spacing:0.05em; }
    header p { margin:4px 0 0; font-size:12px; color:var(--muted); font-family:var(--mono); }
    .tabs { display:flex; padding:0 40px; background:var(--surface); border-bottom:1px solid var(--border); }
    .tab { padding:12px 20px; font-family:var(--mono); font-size:12px; color:var(--muted); cursor:pointer; border:none; background:none; border-bottom:2px solid transparent; margin-bottom:-1px; transition:color 0.15s,border-color 0.15s; letter-spacing:0.05em; }
    .tab:hover { color:var(--text); }
    .tab.active { color:var(--text); border-bottom-color:var(--text); }
    .panels { max-width:720px; margin:0 auto; padding:32px 40px; }
    .panel { display:none; }
    .panel.active { display:block; }
    .field { margin-bottom:20px; }
    label { display:block; font-family:var(--mono); font-size:11px; font-weight:500; letter-spacing:0.08em; color:var(--muted); text-transform:uppercase; margin-bottom:6px; }
    input[type="text"], textarea { width:100%; padding:10px 12px; font-family:var(--mono); font-size:12px; line-height:1.6; color:var(--text); background:var(--surface); border:1px solid var(--border); border-radius:4px; outline:none; resize:vertical; transition:border-color 0.15s; }
    input[type="text"]:focus, textarea:focus { border-color:var(--text); }
    textarea { min-height:72px; }
    .output { width:100%; padding:10px 12px; font-family:var(--mono); font-size:11px; line-height:1.7; color:var(--text); background:var(--bg); border:1px solid var(--border); border-radius:4px; word-break:break-all; min-height:40px; white-space:pre-wrap; }
    .output-wrap { position:relative; }
    .copy-btn { position:absolute; top:6px; right:6px; padding:3px 8px; font-family:var(--mono); font-size:10px; color:var(--muted); background:var(--surface); border:1px solid var(--border); border-radius:3px; cursor:pointer; transition:color 0.15s,border-color 0.15s; }
    .copy-btn:hover { color:var(--text); border-color:var(--text); }
    button.action { padding:10px 20px; font-family:var(--mono); font-size:12px; font-weight:500; letter-spacing:0.05em; color:var(--bg); background:var(--text); border:none; border-radius:4px; cursor:pointer; transition:opacity 0.15s; }
    button.action:hover { opacity:0.8; }
    .result-badge { display:inline-block; padding:4px 10px; font-family:var(--mono); font-size:11px; font-weight:500; border-radius:3px; margin-top:8px; }
    .result-badge.valid { background:#d8f3dc; color:var(--success); }
    .result-badge.invalid { background:#ffe0e0; color:var(--error); }
    .divider { border:none; border-top:1px solid var(--border); margin:28px 0; }
    @media (max-width:600px) { header,.tabs { padding-left:20px; padding-right:20px; } .panels { padding:24px 20px; } }
  </style>
</head>
<body>
<header>
  <h1>ecdsa_tool</h1>
  <p>そんな意味はとくにはありませんよb</p>
</header>
<div class="tabs">
  <button class="tab active" onclick="switchTab('keygen')">keygen</button>
  <button class="tab" onclick="switchTab('sign')">sign</button>
  <button class="tab" onclick="switchTab('verify')">verify</button>
  <button class="tab" onclick="switchTab('compress')">compress</button>
  <button class="tab" onclick="switchTab('privtopub')">priv→pub</button>
</div>
<div class="panels">

  <!-- keygen -->
  <div id="panel-keygen" class="panel active">
    <div class="field"><button class="action" onclick="doKeygen()">鍵を生成する</button></div>
    <div class="field">
      <label>private key</label>
      <div class="output-wrap"><div class="output" id="out-privkey">—</div><button class="copy-btn" onclick="copyText('out-privkey')">copy</button></div>
    </div>
    <div class="field">
      <label>public key (compressed)</label>
      <div class="output-wrap"><div class="output" id="out-pubkey">—</div><button class="copy-btn" onclick="copyText('out-pubkey')">copy</button></div>
    </div>
  </div>

  <!-- sign -->
  <div id="panel-sign" class="panel">
    <div class="field"><label>message</label><textarea id="sign-message" placeholder="署名するメッセージを入力"></textarea></div>
    <div class="field"><label>private key (hex)</label><input type="text" id="sign-privkey" placeholder="64文字の16進数"></div>
    <div class="field"><button class="action" onclick="doSign()">署名する</button></div>
    <div class="field">
      <label>signature</label>
      <div class="output-wrap"><div class="output" id="out-signature">—</div><button class="copy-btn" onclick="copyText('out-signature')">copy</button></div>
    </div>
  </div>

  <!-- verify -->
  <div id="panel-verify" class="panel">
    <div class="field"><label>message</label><textarea id="verify-message" placeholder="検証するメッセージを入力"></textarea></div>
    <div class="field"><label>signature (hex)</label><input type="text" id="verify-signature" placeholder="128文字の16進数"></div>
    <div class="field"><label>public key (hex)</label><input type="text" id="verify-pubkey" placeholder="圧縮(66文字) または 非圧縮(128文字)"></div>
    <div class="field"><button class="action" onclick="doVerify()">検証する</button></div>
    <div id="verify-result"></div>
  </div>

  <!-- compress -->
  <div id="panel-compress" class="panel">
    <div class="field"><label>public key (uncompressed, 128文字)</label><input type="text" id="compress-input" placeholder="x座標+y座標の128文字"></div>
    <div class="field"><button class="action" onclick="doCompress()">圧縮する</button></div>
    <div class="field">
      <label>compressed</label>
      <div class="output-wrap"><div class="output" id="out-compressed">—</div><button class="copy-btn" onclick="copyText('out-compressed')">copy</button></div>
    </div>
    <hr class="divider">
    <div class="field"><label>public key (compressed, 66文字)</label><input type="text" id="decompress-input" placeholder="02または03から始まる66文字"></div>
    <div class="field"><button class="action" onclick="doDecompress()">解凍する</button></div>
    <div class="field">
      <label>decompressed</label>
      <div class="output-wrap"><div class="output" id="out-decompressed">—</div><button class="copy-btn" onclick="copyText('out-decompressed')">copy</button></div>
    </div>
  </div>

  <!-- priv→pub -->
  <div id="panel-privtopub" class="panel">
    <div class="field"><label>private key (hex)</label><input type="text" id="privtopub-input" placeholder="64文字の16進数"></div>
    <div class="field"><button class="action" onclick="doPrivToPub()">公開鍵を導出する</button></div>
    <div class="field">
      <label>public key (compressed)</label>
      <div class="output-wrap"><div class="output" id="out-privtopub-compressed">—</div><button class="copy-btn" onclick="copyText('out-privtopub-compressed')">copy</button></div>
    </div>
    <div class="field">
      <label>public key (uncompressed)</label>
      <div class="output-wrap"><div class="output" id="out-privtopub-uncompressed">—</div><button class="copy-btn" onclick="copyText('out-privtopub-uncompressed')">copy</button></div>
    </div>
  </div>

</div>
<script>
class ECDSA {
    P = 0xffffffff00000001000000000000000000000000ffffffffffffffffffffffffn;
    a = 0xffffffff00000001000000000000000000000000fffffffffffffffffffffffcn;
    b = 0x5ac635d8aa3a93e7b3ebbd55769886bc651d06b0cc53b0f63bce3c3e27d2604bn; // めんどくさー
    N = 0xffffffff00000000ffffffffffffffffbce6faada7179e84f3b9cac2fc632551n;
    G = [
        0x6b17d1f2e12c4247f8bce6e563a440f277037d812deb33a0f4a13945d898c296n,
        0x4fe342e2fe1a7f9b8ee7eb4a7c0f9e162bce33576b315ececbb6406837bf51f5n,
    ];
    sha256(data) {
        const K = new Uint32Array([
            0x428a2f98, 0x71374491, 0xb5c0fbcf, 0xe9b5dba5, 0x3956c25b, 0x59f111f1,
            0x923f82a4, 0xab1c5ed5, 0xd807aa98, 0x12835b01, 0x243185be, 0x550c7dc3,
            0x72be5d74, 0x80deb1fe, 0x9bdc06a7, 0xc19bf174, 0xe49b69c1, 0xefbe4786,
            0x0fc19dc6, 0x240ca1cc, 0x2de92c6f, 0x4a7484aa, 0x5cb0a9dc, 0x76f988da,
            0x983e5152, 0xa831c66d, 0xb00327c8, 0xbf597fc7, 0xc6e00bf3, 0xd5a79147,
            0x06ca6351, 0x14292967, 0x27b70a85, 0x2e1b2138, 0x4d2c6dfc, 0x53380d13,
            0x650a7354, 0x766a0abb, 0x81c2c92e, 0x92722c85, 0xa2bfe8a1, 0xa81a664b,
            0xc24b8b70, 0xc76c51a3, 0xd192e819, 0xd6990624, 0xf40e3585, 0x106aa070,
            0x19a4c116, 0x1e376c08, 0x2748774c, 0x34b0bcb5, 0x391c0cb3, 0x4ed8aa4a,
            0x5b9cca4f, 0x682e6ff3, 0x748f82ee, 0x78a5636f, 0x84c87814, 0x8cc70208,
            0x90befffa, 0xa4506ceb, 0xbef9a3f7, 0xc67178f2,
        ]);
        const rotr = (x, n) => (x >>> n) | (x << (32 - n));
        let h0 = 0x6a09e667, h1 = 0xbb67ae85, h2 = 0x3c6ef372, h3 = 0xa54ff53a;
        let h4 = 0x510e527f, h5 = 0x9b05688c, h6 = 0x1f83d9ab, h7 = 0x5be0cd19;
        const len = data.length;
        const bitLen = len * 8;
        // ★ここを正しく修正★
        const blockCount = Math.ceil((len + 9) / 64);
        const blocks = new Uint8Array(blockCount * 64);
        blocks.set(data);
        blocks[len] = 0x80;
        const view = new DataView(blocks.buffer);
        // ビット長（big-endian）
        view.setUint32(blocks.length - 8, Math.floor(bitLen / 0x100000000), false);
        view.setUint32(blocks.length - 4, bitLen >>> 0, false);
        for (let i = 0; i < blocks.length; i += 64) {
            const W = new Uint32Array(64);
            for (let t = 0; t < 16; t++) {
                W[t] = view.getUint32(i + t * 4, false);
            }
            for (let t = 16; t < 64; t++) {
                const s0 = rotr(W[t - 15], 7) ^ rotr(W[t - 15], 18) ^ (W[t - 15] >>> 3);
                const s1 = rotr(W[t - 2], 17) ^ rotr(W[t - 2], 19) ^ (W[t - 2] >>> 10);
                W[t] = (((W[t - 16] + s0) | 0) + ((W[t - 7] + s1) | 0)) >>> 0;
            }
            let a = h0, b = h1, c = h2, d = h3, e = h4, f = h5, g = h6, h = h7;
            for (let t = 0; t < 64; t++) {
                const S1 = rotr(e, 6) ^ rotr(e, 11) ^ rotr(e, 25);
                const ch = (e & f) ^ (~e & g);
                const temp1 = (((h + S1) | 0) + (ch | 0) + (K[t] | 0) + (W[t] | 0)) >>> 0;
                const S0 = rotr(a, 2) ^ rotr(a, 13) ^ rotr(a, 22);
                const maj = (a & b) ^ (a & c) ^ (b & c);
                const temp2 = ((S0 + maj) | 0) >>> 0;
                h = g;
                g = f;
                f = e;
                e = (d + temp1) >>> 0;
                d = c;
                c = b;
                b = a;
                a = (temp1 + temp2) >>> 0;
            }
            h0 = (h0 + a) >>> 0;
            h1 = (h1 + b) >>> 0;
            h2 = (h2 + c) >>> 0;
            h3 = (h3 + d) >>> 0;
            h4 = (h4 + e) >>> 0;
            h5 = (h5 + f) >>> 0;
            h6 = (h6 + g) >>> 0;
            h7 = (h7 + h) >>> 0;
        }
        const result = new Uint8Array(32);
        const resultView = new DataView(result.buffer);
        resultView.setUint32(0, h0, false);
        resultView.setUint32(4, h1, false);
        resultView.setUint32(8, h2, false);
        resultView.setUint32(12, h3, false);
        resultView.setUint32(16, h4, false);
        resultView.setUint32(20, h5, false);
        resultView.setUint32(24, h6, false);
        resultView.setUint32(28, h7, false);
        return result;
    }
    mod25519(x) {
        let val = x % this.P;
        if (val < 0n)
            val += this.P;
        return val;
    }
    inv(e, mod) {
        let r0 = mod, r1 = e;
        let x0 = 0n, x1 = 1n;
        r1 = r1 % mod;
        if (r1 === 0n)
            return 0n;
        while (r1 !== 0n) {
            const q = r0 / r1;
            const r = r0 % r1;
            r0 = r1;
            r1 = r;
            const tmp = x0 - q * x1;
            x0 = x1;
            x1 = tmp;
        }
        if (r0 !== 1n)
            return 0n;
        return x0 < 0n ? x0 + mod : x0;
    }
    addPoints(P, Q) {
        const [x1, y1] = P;
        const [x2, y2] = Q;
        if (x1 === 0n && y1 === 0n)
            return Q;
        if (x2 === 0n && y2 === 0n)
            return P;
        let m;
        if (x1 === x2) {
            // 修正: P + (-P) または y1 が 0 (垂直接線) の場合は無限遠点を返す
            if (y1 !== y2 || y1 === 0n) {
                return [0n, 0n];
            }
            const num = this.mod25519(3n * x1 * x1 + this.a);
            const den = this.mod25519(2n * y1);
            m = this.mod25519(num * this.inv(den, this.P));
        }
        else {
            const num = this.mod25519(y2 - y1);
            const den = this.mod25519(x2 - x1);
            m = this.mod25519(num * this.inv(den, this.P));
        }
        const x3 = this.mod25519(m * m - x1 - x2);
        const y3 = this.mod25519(m * (x1 - x3) - y1);
        return [x3, y3];
    }
    scalarMult(k, P) {
        let R0 = [0n, 0n]; // 無限遠点
        let R1 = P;
        // P-256の位数nが256ビットなので、常に256回ループさせる
        for (let i = 255; i >= 0; i--) {
            const bit = (k >> BigInt(i)) & 1n;
            if (bit === 0n) {
                R1 = this.addPoints(R0, R1);
                R0 = this.addPoints(R0, R0);
            }
            else {
                R0 = this.addPoints(R0, R1);
                R1 = this.addPoints(R1, R1);
            }
        }
        return R0;
    }
    isPointOnCurve(P) {
        const [x, y] = P;
        if (x === 0n && y === 0n)
            return false;
        const left = this.mod25519(y * y);
        const right = this.mod25519(x ** 3n + this.a * x + this.b);
        return left === right;
    }
    bigintToHex(n) {
        return n.toString(16).toUpperCase().padStart(64, "0");
    }
    hexToBigInt(hex) {
        return BigInt("0x" + hex);
    }
    signtobigint(message, privateKey) {
        let k = (this.bytesToBigInt(this.sha256(new Uint8Array([
            ...this.sha256(new Uint8Array([
                ...this.BigintToBytes(this.hexToBigInt(privateKey)),
                ...message,
            ])),
            ...message,
            ...this.BigintToBytes(this.hexToBigInt(privateKey)),
        ]))) %
            (this.N - 1n)) +
            1n;
        const privKey = this.hexToBigInt(privateKey);
        const R = this.scalarMult(k, this.G);
        const r = R[0] % this.N;
        const s = (this.inv(k, this.N) *
            ((this.bytesToBigInt(this.sha256(message)) + r * privKey) % this.N)) %
            this.N;
        // 修正: 署名要件として r または s が 0 の場合はエラー
        if (r === 0n || s === 0n) {
            throw new Error("署名値が0になりました。アルゴリズム要件により失敗とみなします。");
        }
        return { r, s };
    }
    sign(message, privateKey) {
        const { r, s } = this.signtobigint(message, privateKey);
        return this.bigintToHex(r) + this.bigintToHex(s);
    }
    verify(message, signature, publicKey) {
        const uncompressed = publicKey.length === 66 ? this.decompressPublicKey(publicKey) : publicKey;
        if (this.isPointOnCurve([
            this.hexToBigInt(uncompressed.slice(0, 64)),
            this.hexToBigInt(uncompressed.slice(64, 128)),
        ]) === false) {
            throw new Error("無効な公開鍵: 曲線上にありません");
        }
        const r = this.hexToBigInt(signature.slice(0, 64));
        const s = this.hexToBigInt(signature.slice(64, 128));
        if (r <= 0n || r >= this.N || s <= 0n || s >= this.N)
            return false;
        const w = this.inv(s, this.N);
        const u1 = (this.bytesToBigInt(this.sha256(message)) * w) % this.N;
        const u2 = (r * w) % this.N;
        const P1 = this.scalarMult(u1, this.G);
        const P2 = this.scalarMult(u2, [
            this.hexToBigInt(uncompressed.slice(0, 64)),
            this.hexToBigInt(uncompressed.slice(64, 128)),
        ]);
        const X = this.addPoints(P1, P2);
        return X[0] % this.N === r;
    }
    generateKeyPair() {
        const privateKey = this.getRandomBigInt(this.N - 1n) + 1n;
        const pubPoint = this.scalarMult(privateKey, this.G);
        const uncompressed = this.bigintToHex(pubPoint[0]) + this.bigintToHex(pubPoint[1]);
        return {
            privateKey: this.bigintToHex(privateKey),
            publicKey: this.compressPublicKey(uncompressed),
        };
    }
    BigintToBytes(n) {
        const hex = n.toString(16).toUpperCase().padStart(64, "0");
        const bytes = new Uint8Array(32);
        for (let i = 0; i < 32; i++) {
            bytes[i] = parseInt(hex.slice(i * 2, i * 2 + 2), 16);
        }
        return bytes;
    }
    bytesToBigInt(bytes) {
        const len = bytes.length;
        let res = 0n;
        const view = new DataView(bytes.buffer, bytes.byteOffset, len);
        let i = 0;
        for (; i <= len - 8; i += 8) {
            res = (res << 64n) + view.getBigUint64(i);
        }
        for (; i < len; i++) {
            res = (res << 8n) + BigInt(bytes[i]);
        }
        return res;
    }
    modSqrt(n) {
        if (n === 0n)
            return 0n;
        // 修正: 平方剰余かどうかの事前確認。これにより無限ループと指数エラーを防ぐ。
        if (this.modPow(n, (this.P - 1n) / 2n) !== 1n) {
            throw new Error("平方根が存在しません");
        }
        let Q = this.P - 1n;
        let S = 0n;
        while (Q % 2n === 0n) {
            Q /= 2n;
            S++;
        }
        let z = 2n;
        while (this.modPow(z, (this.P - 1n) / 2n) !== this.P - 1n) {
            z++;
        }
        let M = S;
        let c = this.modPow(z, Q);
        let t = this.modPow(n, Q);
        let R = this.modPow(n, (Q + 1n) / 2n);
        while (true) {
            if (t === 1n)
                return R;
            let i = 1n;
            let tmp = (t * t) % this.P;
            while (tmp !== 1n) {
                tmp = (tmp * tmp) % this.P;
                i++;
            }
            const b = this.modPow(c, 2n ** (M - i - 1n));
            M = i;
            c = (b * b) % this.P;
            t = (t * b * b) % this.P;
            R = (R * b) % this.P;
        }
    }
    modPow(base, exp) {
        let result = 1n;
        base = base % this.P;
        while (exp > 0n) {
            if (exp & 1n)
                result = (result * base) % this.P;
            base = (base * base) % this.P;
            exp >>= 1n;
        }
        return result;
    }
    compressPublicKey(publicKey) {
        const x = this.hexToBigInt(publicKey.slice(0, 64));
        const y = this.hexToBigInt(publicKey.slice(64, 128));
        const prefix = y % 2n === 0n ? "02" : "03";
        return prefix + this.bigintToHex(x);
    }
    decompressPublicKey(compressed) {
        const prefix = compressed.slice(0, 2);
        const x = this.hexToBigInt(compressed.slice(2, 66));
        const rhs = this.mod25519(x * x * x + this.a * x + this.b);
        const y = this.modSqrt(rhs);
        const isOdd = y % 2n === 1n;
        const wantOdd = prefix === "03";
        const finalY = isOdd === wantOdd ? y : this.P - y;
        return this.bigintToHex(x) + this.bigintToHex(finalY);
    }
    getRandomBigInt(max) {
        const bytes = Math.ceil(max.toString(2).length / 8);
        let rand;
        do {
            const buf = new Uint8Array(bytes);
            globalThis.crypto.getRandomValues(buf);
            rand = this.bytesToBigInt(buf);
        } while (rand >= max);
        return rand;
    }
    privateKeyToPublicKey(privateKeyHex) {
        const privKey = this.hexToBigInt(privateKeyHex);
        if (privKey <= 0n || privKey >= this.N)
            throw new Error("無効な秘密鍵");
        const pubPoint = this.scalarMult(privKey, this.G);
        const uncompressed = this.bigintToHex(pubPoint[0]) + this.bigintToHex(pubPoint[1]);
        return {
            compressed: this.compressPublicKey(uncompressed),
            uncompressed,
        };
    }
    ecdh(privateKeyHex, peerPublicKeyHex) {
        const privKey = this.hexToBigInt(privateKeyHex);
        if (privKey <= 0n || privKey >= this.N)
            throw new Error("無効な秘密鍵");
        const uncompressed = peerPublicKeyHex.length === 66
            ? this.decompressPublicKey(peerPublicKeyHex)
            : peerPublicKeyHex;
        const peerX = this.hexToBigInt(uncompressed.slice(0, 64));
        const peerY = this.hexToBigInt(uncompressed.slice(64, 128));
        if (!this.isPointOnCurve([peerX, peerY])) {
            throw new Error("無効な公開鍵");
        }
        const sharedPoint = this.scalarMult(privKey, [peerX, peerY]);
        return this.bigintToHex(sharedPoint[0]);
    }
    /**
     * r, s (BigInt) を 64バイトの Raw 署名 (Uint8Array) に変換
     */
    encodeRaw(r, s) {
        const raw = new Uint8Array(64);
        // r を 32バイト (先頭 0 埋め) で配置
        const rBytes = this.bigIntToBytes32(r);
        // s を 32バイト (先頭 0 埋め) で配置
        const sBytes = this.bigIntToBytes32(s);
        raw.set(rBytes, 0);
        raw.set(sBytes, 32);
        return raw;
    }
    /**
     * 64バイトの Raw 署名を r, s (BigInt) に戻す
     */
    decodeRaw(raw) {
        if (raw.length !== 64) {
            throw new Error("Invalid Raw signature length. Expected 64 bytes.");
        }
        const rBytes = raw.slice(0, 32);
        const sBytes = raw.slice(32, 64);
        return {
            r: this.bytesToBigInt(rBytes),
            s: this.bytesToBigInt(sBytes),
        };
    }
    /**
     * 補助関数: BigInt を 32バイト固定の Uint8Array に変換
     */
    bigIntToBytes32(n) {
        const hex = n.toString(16).padStart(64, "0");
        const bytes = new Uint8Array(32);
        for (let i = 0; i < 32; i++) {
            bytes[i] = parseInt(hex.substring(i * 2, i * 2 + 2), 16);
        }
        return bytes;
    }
    signRaw(message, privateKey) {
        const sign = this.signtobigint(message, privateKey); // 署名値の生成と要件チェック
        return this.encodeRaw(sign.r, sign.s);
    }
    verifyRaw(message, rawSignature, publicKey) {
        const { r, s } = this.decodeRaw(rawSignature);
        const signatureHex = this.bigintToHex(r) + this.bigintToHex(s);
        return this.verify(message, signatureHex, publicKey);
    }
    /**
     * 生の秘密鍵 (d) を Web Crypto 等が読み込める PKCS#8 (DER) 形式にパッキングする
     */
    pack(privateKeyHex) {
        const dBytes = this.BigintToBytes(this.hexToBigInt(privateKeyHex));
        const pub = this.privateKeyToPublicKey(privateKeyHex);
        const qBytes = this.hexToBytes("04" + pub.uncompressed); // 非圧縮を示す 04 を付加
        // --- ASN.1 構造の組み立て ---
        // 1. ECPrivateKey 構造 (RFC 5915)
        // [Version(1), PrivateKey(32 bytes), PublicKey(65 bytes)]
        const ecPrivKeySeq = this.wrapSequence(new Uint8Array([
            0x02,
            0x01,
            0x01, // Version 1
            0x04,
            0x20,
            ...dBytes, // PrivateKey (Octet String 32 bytes)
            0xa1,
            0x44,
            0x03,
            0x42,
            0x00,
            ...qBytes, // PublicKey (Bit String 65 bytes)
        ]));
        // 2. PKCS#8 構造本体 (RFC 5208)
        // [Version(0), PrivateKeyAlgorithm, PrivateKey]
        const pkcs8 = this.wrapSequence(new Uint8Array([
            0x02,
            0x01,
            0x00, // PKCS#8 Version 0
            // PrivateKeyAlgorithm: id-ecPublicKey (1.2.840.10045.2.1) & prime256v1 (1.2.840.10045.3.1.7)
            0x30,
            0x13,
            0x06,
            0x07,
            0x2a,
            0x86,
            0x48,
            0xce,
            0x3d,
            0x02,
            0x01,
            0x06,
            0x08,
            0x2a,
            0x86,
            0x48,
            0xce,
            0x3d,
            0x03,
            0x01,
            0x07,
            0x04,
            ...this.encodeLength(ecPrivKeySeq.length),
            ...ecPrivKeySeq, // Wrapped ECPrivateKey
        ]));
        return pkcs8;
    }
    /**
     * PKCS#8 (DER) をパースして、生の秘密鍵 (Hex) を取り出す
     */
    unpack(pkcs8) {
        let pos = 0;
        // ヘルパー: タグと長さを読み取って中身を切り出す
        const readNode = () => {
            const tag = pkcs8[pos++];
            let len = pkcs8[pos++];
            if (len & 0x80) {
                const lenBytes = len & 0x7f;
                len = 0;
                for (let i = 0; i < lenBytes; i++) {
                    len = (len << 8) | pkcs8[pos++];
                }
            }
            const data = pkcs8.slice(pos, pos + len);
            // pos は更新しない（中身をさらにパースしたい場合があるため）
            return { tag, len, data, totalLen: pos + len };
        };
        // 1. Root SEQUENCE
        const root = readNode();
        pos = 2 + (root.len >= 128 ? (root.len >= 256 ? 3 : 2) : 0); // Root の中へ
        // 2. Version (INTEGER) - スキップ
        const ver = readNode();
        pos = ver.totalLen;
        // 3. AlgorithmIdentifier (SEQUENCE) - スキップ
        const algo = readNode();
        pos = algo.totalLen;
        // 4. PrivateKey (OCTET STRING) - この中に ECPrivateKey 構造が入っている
        const privKeyWrapper = readNode();
        pos += privKeyWrapper.len >= 128 ? 3 : 2; // Wrapper の中へ
        // 5. ECPrivateKey (SEQUENCE)
        const ecPrivKey = readNode();
        pos += 2; // EC Version (02 01 01) の中へ
        // 6. Version (INTEGER) - スキップ
        const ecVer = readNode();
        pos = ecVer.totalLen;
        // 7. 核心！PRIVATE KEY (OCTET STRING 32 bytes)
        const dNode = readNode();
        return Buffer.from(dNode.data).toString("hex").toUpperCase();
    }
    /**
     * ASN.1 SEQUENCE タグ (0x30) でデータを包む
     */
    wrapSequence(data) {
        const lenEncoded = this.encodeLength(data.length);
        const res = new Uint8Array(1 + lenEncoded.length + data.length);
        res[0] = 0x30;
        res.set(lenEncoded, 1);
        res.set(data, 1 + lenEncoded.length);
        return res;
    }
    /**
     * ASN.1 の長さフィールド (DER) をエンコード
     */
    encodeLength(len) {
        if (len < 128) {
            return new Uint8Array([len]);
        }
        if (len < 256) {
            return new Uint8Array([0x81, len]);
        }
        // P-256なら 256バイトを超えることはないのでここまででOK
        return new Uint8Array([0x82, (len >> 8) & 0xff, len & 0xff]);
    }
    hexToBytes(hex) {
        const bytes = new Uint8Array(hex.length / 2);
        for (let i = 0; i < bytes.length; i++) {
            bytes[i] = parseInt(hex.slice(i * 2, i * 2 + 2), 16);
        }
        return bytes;
    }
}

const ecdsa=new ECDSA(),enc=new TextEncoder();

function switchTab(name){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));document.querySelector(`[onclick="switchTab('${name}')"]`).classList.add('active');document.getElementById(`panel-${name}`).classList.add('active');}
function setOutput(id,text){document.getElementById(id).textContent=text;}
function copyText(id){const text=document.getElementById(id).textContent;if(text==='—')return;navigator.clipboard.writeText(text).then(()=>{const btn=document.querySelector(`[onclick="copyText('${id}')"]`);const orig=btn.textContent;btn.textContent='copied';setTimeout(()=>btn.textContent=orig,1200);});}
function doKeygen(){console.time('keygen');const kp=ecdsa.generateKeyPair();setOutput('out-privkey',kp.privateKey);setOutput('out-pubkey',kp.publicKey);console.timeEnd('keygen');}
function doSign(){console.time('sign');const msg=document.getElementById('sign-message').value,priv=document.getElementById('sign-privkey').value.trim();if(!msg||!priv)return;try{setOutput('out-signature',ecdsa.sign(enc.encode(msg),priv));}catch(e){setOutput('out-signature','エラー: '+e.message);}console.timeEnd('sign');}
function doVerify(){console.time('verify');const msg=document.getElementById('verify-message').value,sig=document.getElementById('verify-signature').value.trim(),pub=document.getElementById('verify-pubkey').value.trim();if(!msg||!sig||!pub)return;try{const valid=ecdsa.verify(enc.encode(msg),sig,pub);document.getElementById('verify-result').innerHTML=`<span class="result-badge ${valid?'valid':'invalid'}">${valid?'✓ 有効':'✗ 無効'}</span>`;}catch(e){document.getElementById('verify-result').innerHTML=`<span class="result-badge invalid">エラー: ${e.message}</span>`;}console.timeEnd('verify');}
function doCompress(){const hex=document.getElementById('compress-input').value.trim();if(!hex)return;try{setOutput('out-compressed',ecdsa.compressPublicKey(hex));}catch(e){setOutput('out-compressed','エラー: '+e.message);}}
function doDecompress(){const hex=document.getElementById('decompress-input').value.trim();if(!hex)return;try{setOutput('out-decompressed',ecdsa.decompressPublicKey(hex));}catch(e){setOutput('out-decompressed','エラー: '+e.message);}}
function doPrivToPub(){
    console.time('privtopub');
    const hex=document.getElementById('privtopub-input').value.trim();
    if(!hex)return;
    try{
        const result=ecdsa.privateKeyToPublicKey(hex);
        setOutput('out-privtopub-compressed',result.compressed);
        setOutput('out-privtopub-uncompressed',result.uncompressed);
    }catch(e){
        setOutput('out-privtopub-compressed','エラー: '+e.message);
        setOutput('out-privtopub-uncompressed','');
    }
    console.timeEnd('privtopub');
}
